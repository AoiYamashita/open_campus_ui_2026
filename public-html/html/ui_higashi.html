<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <!-- roslibのファイルを指定してください -->
    <script type="text/javascript" src="../roslib.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Wally</title>

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0c0817;
            font-family: 'Consolas', 'Courier New', monospace, "MS Gothic";
            overflow: hidden;
            user-select: none;
            color: #00f0ff;
        }

        /* ==========================================
           【背景：100%全面】ウォーリーフェイス
           ========================================== */
        .wally-fullscreen-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffd3b6;
            background-image: url('./waldo2.dcd79bf1ce0619360780.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            overflow: hidden;
            z-index: 1;
        }

        /* 赤白の帽子 */
        .wally-hat {
            position: absolute;
            top: 0;
            width: 100%;
            height: 10%;
            background: repeating-linear-gradient(-45deg,
                    #ff0000,
                    #ff0000 25px,
                    #ffffff 25px,
                    #ffffff 50px);
            border-bottom: 5px solid #ff0000;
        }

        .hat-frame {
            position: absolute;

            /* 下3つで中央に移動できるマジック */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 98%;
            height: 75%;
            /* border: 12px solid #111111; */
            /* border-radius: 50%; */
            background: #f1f1f1;
        }

        .hat_text_left {
            position: absolute;
            top: 50%;
            left: 20%;
            transform: translate(-50%, -50%);
            /* font-family: 'Cherry Swash', cursive; */
            font-size: 60px;
            font-weight: bold;
            color: #00f0ff;
            text-shadow: 2px 2px 0px #000000, -2px 2px 0px #000000, 2px -2px 0px #000000, -2px -2px 0px #000000;
            /* background-color: #ffffff; */
        }

        .hat_text_right{
            position: absolute;
            top: 50%;
            left: 80%;
            transform: translate(-50%, -50%);
            /* font-family: 'Cherry Swash', cursive; */
            font-size: 60px;
            font-weight: bold;
            color: #00f0ff;
            text-shadow: 2px 2px 0px #000000, -2px 2px 0px #000000, 2px -2px 0px #000000, -2px -2px 0px #000000;
            /* background-color: #ffffff; */
        }

        /* メガネと目 */
        .glasses-container {
            position: absolute;
            top: 11%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 2;
        }

        .wally-face-overlay {
            position: absolute;
            top: -20%;
            left: 51%;
            transform: translateX(-50%) scale(1.3);
            width: min(620px, 82vw);
            height: auto;
            z-index: 1;
            pointer-events: none;
        }

        .lens {
            width: 120px;
            height: 120px;
            border: 12px solid #111111;
            border-radius: 50%;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .bridge {
            position: absolute;
            width: 30px;
            height: 12px;
            background: #111111;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .pupil {
            width: 20px;
            height: 20px;
            background: #111111;
            border-radius: 50%;
            position: absolute;
            /* top: calc(50% - 17.5px);
            left: calc(50% - 17.5px); */
            top: 50%;
            left: 50%;
            /* transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275); */
            transform: translate(-50%, -50%);
            
        }

        /* .pupil::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 9px;
            height: 9px;
            background: #ffffff;
            border-radius: 50%;
        } */

        /* スキャンレーザー */
        .scan-laser {
            position: absolute;
            width: 100%;
            height: 6px;
            background: rgba(0, 255, 85, 0.8);
            box-shadow: 0 0 20px #00ff55;
            top: 28%;
            left: 0;
            opacity: 0;
            z-index: 3;
            pointer-events: none;
        }

        /* ターゲットロック枠 */
        .target-lock-box {
            position: absolute;
            width: 310px;
            height: 140px;
            border: 4px solid #ff0055;
            top: -10px;
            left: -25px;
            box-sizing: border-box;
            z-index: 4;
            opacity: 0;
            transform: scale(1.3);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            pointer-events: none;
        }

        .target-lock-box .corner {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 4px solid #ff0055;
        }

        .target-lock-box .topleft {
            top: -6px;
            left: -6px;
            border-right: none;
            border-bottom: none;
        }

        .target-lock-box .topright {
            top: -6px;
            right: -6px;
            border-left: none;
            border-bottom: none;
        }

        .target-lock-box .bottomleft {
            bottom: -6px;
            left: -6px;
            border-right: none;
            border-top: none;
        }

        .target-lock-box .bottomright {
            bottom: -6px;
            right: -6px;
            border-left: none;
            border-top: none;
        }

        /* びっくりマーク */
        .surprise-mark {
            position: absolute;
            font-size: 70px;
            color: #ff0055;
            font-weight: bold;
            top: -25px;
            text-shadow: -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 3px 3px 0 #fff;
            z-index: 5;
            opacity: 0;
            transform: scale(0.3) rotate(-15deg);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.5);
        }

        .mark-left {
            left: -70px;
        }

        .mark-right {
            right: -70px;
        }

        .scanning-active .scan-laser {
            opacity: 1;
            animation: laserSweep 2s infinite ease-in-out;
        }

        @keyframes laserSweep {
            0% {
                top: 28%;
            }

            50% {
                top: 82%;
            }

            100% {
                top: 28%;
            }
        }

        .lock-active .target-lock-box {
            opacity: 1;
            transform: scale(1);
        }

        .lock-active .surprise-mark {
            opacity: 1;
        }

        .lock-active .mark-left {
            transform: scale(1.1) rotate(-15deg);
        }

        .lock-active .mark-right {
            transform: scale(1.1) rotate(15deg);
        }

        /* タイマーコンテナ */
        .timer-container {
            position: absolute;
            top: 100px;
            left: 50px;
            width: 300px;
            height: 70px;
            z-index: 100;
            background-color: #22373C;
            padding: 15px 20px;
            border-radius: 12px;
            border: 3px solid #00f0ff;
            box-shadow: 0 0 25px #00f0ff4d;
            /* font-family: 'Arial', sans-serif; */
        }

        .timer-display {
            font-size: 48px;
            font-weight: bold;
            color: #5df4ff;
            font-family: "Courier New", Courier, monospace;
            letter-spacing: 2px;
            text-align: center;
            margin-top: 5px;
        }

        .timer-label {
            font-size: 16px;
            font-weight: bold;
            color: #5df4ff;
            text-align: center;
        }


        /* ==========================================
           【前面：オーバーレイHUD】
           ========================================== */
        .hud-overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            box-sizing: border-box;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        /* 1. 【中央：大画面メインカメラモニター】最大サイズでフル表示 */

        /* TODO：送られてくる画像のサイズに合わせる */
        .camera-row {
            width: 100vw;
            max-width: 1100px;
            height: 100vh;
            max-height: 500px;
            display: flex;
            pointer-events: auto;
            margin-top: auto;
            margin-bottom: 15px;
        }

        .center-camera-window {
            width: 100%;
            background: rgba(4, 2, 10, 0.9);
            backdrop-filter: blur(5px);
            border: 3px solid #00f0ff;
            box-shadow: 0 0 25px #00f0ff59;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        .camera-header {
            background: #00f0ff26;
            color: #00f0ff;
            font-size: 11px;
            padding: 8px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #00f0ff4d;
            letter-spacing: 1px;
        }

        .camera-feed-canvas {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: #0d0a1a;
        }

        .camera-book-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        

        /* 絵本の群衆マップ */
        /* .camera-book-bg {
            position: absolute;
            width: 250%;
            height: 250%;
            top: -75%;
            left: -75%;
            background-image:
                radial-gradient(circle at 15% 25%, #e74c3c 25px, transparent 26px),
                radial-gradient(circle at 85% 15%, #3498db 30px, transparent 31px),
                radial-gradient(circle at 40% 80%, #f1c40f 20px, transparent 21px),
                radial-gradient(circle at 70% 75%, #9b59b6 28px, transparent 29px),
                radial-gradient(circle at 50% 50%, #ffffff 45px, transparent 47px);
            background-size: 180px 180px;
            opacity: 0.5;
            transition: transform 0.1s ease-out;
        } */

        /* 照準器 */
        .camera-reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            border: 2px dashed #00f0ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: all 0.2s;
        }

        .camera-reticle::before,
        .camera-reticle::after {
            content: '';
            position: absolute;
            background: #00f0ff;
        }

        .camera-reticle::before {
            width: 130%;
            height: 2px;
            top: 50%;
            left: -15%;
            transform: translateY(-50%);
        }

        .camera-reticle::after {
            height: 130%;
            width: 2px;
            left: 50%;
            top: -15%;
            transform: translateX(-50%);
        }

        .camera-overlay-text {
            position: absolute;
            bottom: 8px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 4px 10px;
            font-size: 10px;
            color: #00f0ff;
            border-radius: 4px;
            border-left: 3px solid #00f0ff;
        }

        /* ==========================================
           2. 【最下部：操作コンソール（3ボタン仕様）】
           ========================================== */
        .floating-console-panel {
            width: 85vw;
            max-width: 1100px;
            background: rgba(4, 2, 10, 0.95);
            backdrop-filter: blur(4px);
            border: 2px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
            border-radius: 6px;
            pointer-events: auto;
            box-sizing: border-box;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
            transition: border-color 0.2s;
            position: relative;
            /* 子の絶対配置（デバッグ用発見ボタン）の基準 */
        }

        /* 【新・配置】コンソールの左隅に配置される「発見(デバッグ)」ボタン */
        .debug-found-zone {
            position: absolute;
            top: -16px;
            /* コンソールパネルの上フチに乗っかる形 */
            right: 0px;
        }

        .btn-found-tiny {
            background: #ff0055;
            color: #ffffff;
            border: 1px solid #ff598f;
            border-radius: 3px;
            font-size: 15px;
            font-weight: bold;
            padding: 5px 10px;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 0, 85, 0.4);
        }

        .btn-found-tiny:hover {
            opacity: 1;
        }

        .terminal-display {
            flex-grow: 1;
            font-size: 11px;
            line-height: 1.5;
            color: #00f0ff;
            text-shadow: 0 0 3px #00f0ff;
        }

        .terminal-cursor {
            display: inline-block;
            width: 5px;
            height: 11px;
            background: #00f0ff;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 3px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }
        }

        /* 3つの丸ボタンコンテナ */
        .btn-row {
            display: flex;
            gap: 50px;
        }

        .robot-btn {
            width: 150px;
            height: 54px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-family: inherit;
            color: #ffffff;
            font-size: 20px;
            transition: all 0.1s ease;
        }

        .robot-btn:active {
            transform: translateY(1px);
        }

        /* 🟢 スタート */
        .btn-start {
            background: radial-gradient(circle, #39ff14 0%, #116000 100%);
            box-shadow: 0 3px 0px #0b3d00, 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .btn-start:active {
            box-shadow: 0 1px 0px #0b3d00, 0 1px 1px rgba(0, 0, 0, 0.5);
        }

        /* 🟡 ポーズ */
        .btn-pause {
            background: radial-gradient(circle, #ffb300 0%, #8c5e00 100%);
            box-shadow: 0 3px 0px #523700, 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .btn-pause:active {
            box-shadow: 0 1px 0px #523700, 0 1px 1px rgba(0, 0, 0, 0.5);
        }

        /* 🔵 リセット */
        .btn-reset {
            background: radial-gradient(circle, #00f0ff 0%, #00506c 100%);
            box-shadow: 0 3px 0px #003142, 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .btn-reset:active {
            box-shadow: 0 1px 0px #003142, 0 1px 1px rgba(0, 0, 0, 0.5);
        }

        .btn-sub {
            font-size: 7px;
            margin-top: 1px;
            opacity: 0.8;
        }

        /* ロックオン（FOUND）時の全体エフェクト */
        .lock-active .center-camera-window {
            border-color: #ff0055;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.5);
        }

        .lock-active .camera-header {
            background: rgba(255, 0, 85, 0.2);
            color: #ff0055;
            border-color: rgba(255, 0, 85, 0.4);
        }

        .lock-active .camera-reticle {
            border-color: #ff0055;
            border-style: solid;
            transform: translate(-50%, -50%) scale(1.15);
        }

        .lock-active .camera-reticle::before,
        .lock-active .camera-reticle::after {
            background: #ff0055;
        }

        .lock-active .floating-console-panel {
            border-color: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        .lock-active .terminal-display {
            color: #ff0055;
            text-shadow: 0 0 3px #ff0055;
        }

        .lock-active .timer-container {
            border-color: #ff0055;
            box-shadow: 0 0 25px #ff0055;
            background-color: #4a1a27;
        }

        .lock-active .timer-display {
            color: #ff0055;
        }

        .lock-active .timer-label {
            color: #ff0055;
        }
    </style>
</head>

<body id="hudBody">

    <!-- 【背景】ウォーリーフェイス -->
    <div class="wally-fullscreen-bg" id="viewport">
        <div class="scan-laser"></div>
        <div class="wally-hat">
            <div class="hat-frame"></div>
            <span class="hat_text_left">WHERE'S</span>
            <span class="hat_text_right">WALLY?</span>
        </div>
        <!-- ==========================================
        【背景】タイマー表示用（ウォーリー画像の上・左上）
        ========================================== -->
        <div class="timer-container" id="timerDisplayContainer">
            <div class="timer-label">SEARCH TIME</div>
            <div class="timer-display" id="timerDisplay">00:00.00</div>
        </div>

        <img class="wally-face-overlay" src="./wally_face.png" alt="wally face" />

        <div class="glasses-container">
            <div class="surprise-mark mark-left" id="markL">❗️</div>
            <div class="target-lock-box">
                <span class="corner topleft"></span>
                <span class="corner topright"></span>
                <span class="corner bottomleft"></span>
                <span class="corner bottomright"></span>
            </div>

            <div class="lens">
                <div class="pupil" id="pupilL"></div>
            </div>

            <div class="bridge"></div>

            <div class="lens">
                <div class="pupil" id="pupilR"></div>
            </div>

            <div class="surprise-mark mark-right" id="markR">❗️</div>
        </div>
    </div>

    <!-- 【前面】オーバーレイHUD -->
    <div class="hud-overlay-container">

        <!-- 1. [画面中央] メインカメラモニター（最大のまま1カラム表示） -->
        <div class="camera-row">
            <div class="center-camera-window" id="cameraWindow">
                <div class="camera-header">
                    <span id="camTitle" style="font-size: 16px;">🔴 CAMERA_FEED</span>
                </div>
                <div class="camera-feed-canvas">
                    <img class="camera-book-bg" id="bookBg" alt="camera feed" />
                    <div class="camera-reticle"></div>
                </div>
            </div>
        </div>

        <!-- 2. [最下部] 操作コンソール -->
        <div class="floating-console-panel">

            <!-- 【ひっそり配置】消す予定の極小デバッグ用発見ボタン -->
            <div class="debug-found-zone">
                <button class="btn-found-tiny" onclick="foundSystem()">FOUND</button>
            </div>

            <!-- アーム操作用丸ボタン（3ボタン配置は非常にクリーン！） -->
            <div class="btn-row">
                <!-- ① スタート -->
                <button class="robot-btn btn-start" onclick="startSystem()">
                    <span>START</span>
                </button>

                <!-- ② ポーズ（一時停止） -->
                <button class="robot-btn btn-pause" onclick="pauseSystem()">
                    <span>STOP</span>
                </button>

                <!-- ③ リセット -->
                <button class="robot-btn btn-reset" onclick="resetSystem()">
                    <span>RESET</span>
                </button>
            </div>

        </div>

    </div>

    <script>
        const hudBody = document.getElementById('hudBody');
        const viewport = document.getElementById('viewport');
        const cameraWindow = document.getElementById('cameraWindow');
        const bookBg = document.getElementById('bookBg');
        const pupilL = document.getElementById('pupilL');
        const pupilR = document.getElementById('pupilR');
        const camTitle = document.getElementById('camTitle');

        // タイマー用の変数
        const timerContainer = document.getElementById('timerDisplayContainer');
        const timerDisplay = document.getElementById('timerDisplay');
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;

        let scanInterval = null;
        let isScanning = false;
        let isPaused = false;

        let currentJitterX = -50;
        let currentJitterY = -50;
        let currentEyeX = 0;
        let currentEyeY = 0;

        const maxOffset = 18;

        // Create ros object to communicate over your Rosbridge connection
        const ros = new ROSLIB.Ros({
            url: 'ws://localhost:9090',
            options: {
                ros_domain_id: '0' // ROS_DOMAIN_IDを設定する
            }
        });

        // Rosbridgeサーバに接続されたらsuccessful
        ros.on('connection', function () {
            // document.getElementById('hat_text').style.color = "white";
            console.log('Connected to ROSBridge WebSocket server.');
        });

        // Rosbridgeサーバに接続できなかったらerror
        ros.on('error', function (error) {
            // document.getElementById('hat_text').style.color = "red";
            document.getElementById('hat_text').innerHTML = "ERROR HAS OCCURRED...";
            console.log('Error connecting to ROSBridge WebSocket server: ', error);
        });

        // Rosbridgeサーバから切断されたらclose
        ros.on('close', function () {
            // document.getElementById('hat_text').style.color = "red";
            document.getElementById('hat_text').innerHTML = "CONNECTION HAS BEEN LOST...";
            console.log('Connection to ROSBridge WebSocket server closed.');
        });

        var button = new ROSLIB.Topic({
            ros: ros,
            name: '/state',
            messageType: 'std_msgs/UInt8'
        })

        var image_sub = new ROSLIB.Topic({
            ros: ros,
            name: '/webimage',
            messageType: 'std_msgs/msg/String'
        })

        // 画像トピックの購読，表示
        image_sub.subscribe(function (message) {
            console.log("get_images");
            var data = "data:image/png;base64," + message.data;
            setBlob(data)
        })

        let prevSrc = '';
        
        async function setBlob(data_uri){
            const blob = await (await fetch(data_uri)).blob();
            let nowSrc = window.URL.createObjectURL(blob);
            document.getElementById('bookBg').src = nowSrc;
            if (prevSrc !== '') window.URL.revokeObjectURL(prevSrc);
            prevSrc = nowSrc;
        }
        
        function setPupilTransform(x, y, scale = 1) {
            const transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${scale})`;
            pupilL.style.transform = transform;
            pupilR.style.transform = transform;
        }

        function updateSystem() {
            const positions = [
                { x: 0, y: 0 },
                { x: -maxOffset, y: 0 },
                { x: maxOffset, y: 0 },
                { x: 0, y: -maxOffset * 0.7 },
                { x: 0, y: maxOffset * 0.7 },
                { x: -maxOffset * 0.6, y: -maxOffset * 0.6 },
                { x: maxOffset * 0.6, y: maxOffset * 0.6 }
            ];
            const targetPos = positions[Math.floor(Math.random() * positions.length)];
            currentEyeX = targetPos.x;
            currentEyeY = targetPos.y;

            setPupilTransform(currentEyeX, currentEyeY);

            currentJitterX = (Math.random() - 0.5) * 140;
            currentJitterY = (Math.random() - 0.5) * 90;
            // bookBg.style.transform = `translate(${currentJitterX}px, ${currentJitterY}px)`;

        }

        // タイマー表示更新関数
        function updateTimer() {
            const now = Date.now();
            const diff = now - startTime + elapsedTime;

            const minutes = Math.floor(diff / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            const ms = Math.floor((diff % 1000) / 10);

            const minStr = String(minutes).padStart(2, '0');
            const secStr = String(seconds).padStart(2, '0');
            const msStr = String(ms).padStart(2, '0');

            timerDisplay.textContent = `${minStr}:${secStr}.${msStr}`;
        }


        // 0が通常，1がスタート，2がポーズ・ストップ，3がリセットにする

        // 1. スタート
        function startSystem() {
            if (isScanning && !isPaused) return;

            isScanning = true;
            isPaused = false;

            hudBody.classList.remove('lock-active');
            viewport.classList.remove('lock-active');
            viewport.classList.add('scanning-active');

            clearInterval(scanInterval);
            updateSystem();
            scanInterval = setInterval(updateSystem, 400);

            // タイマーの開始・再開
            if (!timerInterval) {
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 33); // 約30FPSで滑らかに更新
            }

            var msg = new ROSLIB.Message({
                data: 1
            });

            button.publish(msg);
            console.log('Published message on ' + button.name + ': ' + msg.data);
        }

        // 2. ポーズ
        function pauseSystem() {
            if (!isScanning || isPaused) return;

            isPaused = true;
            clearInterval(scanInterval);

            viewport.classList.remove('scanning-active');

            setPupilTransform(currentEyeX, currentEyeY);
            // bookBg.style.transform = `translate(${currentJitterX}px, ${currentJitterY}px)`;

            // タイマーの一時停止
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                elapsedTime += Date.now() - startTime;
            }

            var msg = new ROSLIB.Message({
                data: 2
            });

            button.publish(msg);
            console.log('Published message on ' + button.name + ': ' + msg.data);
        }

        // 3. 発見
        function foundSystem() {
            isScanning = false;
            isPaused = false;
            clearInterval(scanInterval);

            viewport.classList.remove('scanning-active');
            viewport.classList.add('lock-active');
            hudBody.classList.add('lock-active');

            setPupilTransform(0, 0, 1.1);
            // bookBg.style.transform = 'translate(0px, 0px)';

            // タイマーの停止と確定
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                elapsedTime += Date.now() - startTime;
            }
        }

        // 4. リセット
        function resetSystem() {
            isScanning = false;
            isPaused = false;
            clearInterval(scanInterval);

            viewport.classList.remove('scanning-active', 'lock-active');
            hudBody.classList.remove('lock-active');

            setPupilTransform(0, 0, 1);
            // bookBg.style.transform = 'translate(-25%, -25%)';

            // タイマーのリセット
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            elapsedTime = 0;
            timerDisplay.textContent = '00:00.00';

            var msg = new ROSLIB.Message({
                data: 3
            });
            button.publish(msg);
            console.log('Published message on ' + button.name + ': ' + msg.data);
        }
    </script>

</body>
